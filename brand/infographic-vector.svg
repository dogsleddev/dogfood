<svg viewBox="0 0 800 1075" width="800" height="1075" xmlns="http://www.w3.org/2000/svg" font-family="Geist, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="gStar" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#EC6D3F"/><stop offset="1" stop-color="#E7B23A"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#E7B23A" stop-opacity="0.45"/><stop offset="45%" stop-color="#EC6D3F" stop-opacity="0.14"/><stop offset="100%" stop-color="#EC6D3F" stop-opacity="0"/></radialGradient>
    <filter id="dropsoft" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0E1726" flood-opacity="0.16"/></filter>

    <symbol id="mark" viewBox="0 0 30 30"><path d="M11 21 L18 16 L25 11" stroke="#B79B86" stroke-width="2" stroke-dasharray="0.5 4" stroke-linecap="round" fill="none"/><path d="M6 17 L11 21 L6 25" stroke="#1c2530" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.5 12 L18 16 L13.5 20" stroke="#1c2530" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 7 L25 11 L21 15" stroke="#EC6D3F" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="st-tent" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 19 L12 5 L21 19 Z"/><path d="M12 5 V19"/><path d="M9 19 L12 13 L15 19"/></g></symbol>
    <symbol id="st-trend" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18 L9 12 L13 15 L21 6"/><path d="M21 6 H15 M21 6 V12"/></g></symbol>
    <symbol id="st-fork" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21 V13"/><path d="M12 13 L6 6"/><path d="M12 13 L18 6"/></g><circle cx="6" cy="6" r="1.7" fill="currentColor"/><circle cx="18" cy="6" r="1.7" fill="currentColor"/><circle cx="12" cy="21" r="1.7" fill="currentColor"/></symbol>
    <symbol id="st-scale" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5 V20"/><path d="M6 20 H18"/><path d="M4 8 H20"/><path d="M4 8 L2 13 a3 2 0 0 0 4 0 Z"/><path d="M20 8 L18 13 a3 2 0 0 0 4 0 Z"/></g><circle cx="12" cy="5" r="1.5" fill="currentColor"/></symbol>
    <symbol id="st-summit" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 L11 6 L18 20 Z"/><path d="M8.5 14 L11 11 L13.5 14"/><path d="M11 6 V2"/><path d="M11 2.4 h5 l-2 1.8 2 1.8 h-5"/></g></symbol>
    <symbol id="star4" viewBox="0 0 24 24"><path d="M12 1 L13.8 9.2 L22 11 L13.8 12.8 L12 21 L10.2 12.8 L2 11 L10.2 9.2 Z" fill="url(#gStar)"/></symbol>
    <symbol id="scout" viewBox="0 0 24 24"><path d="M12 2 L13.4 8.4 L19.5 10 L13.4 11.6 L12 18 L10.6 11.6 L4.5 10 L10.6 8.4 Z" fill="url(#gStar)"/></symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="800" height="1075" fill="#FAF7F1"/>
  <rect x="14" y="14" width="772" height="1047" rx="20" fill="none" stroke="#E6DECF" stroke-width="1.5"/>
  <!-- faint topo contours -->
  <g fill="none" stroke="#0E1726" stroke-opacity="0.04" stroke-width="1.4">
    <ellipse cx="650" cy="840" rx="60" ry="40"/><ellipse cx="650" cy="840" rx="110" ry="74"/><ellipse cx="650" cy="840" rx="162" ry="108"/><ellipse cx="650" cy="840" rx="214" ry="142"/>
    <ellipse cx="150" cy="470" rx="50" ry="34"/><ellipse cx="150" cy="470" rx="96" ry="64"/><ellipse cx="150" cy="470" rx="144" ry="96"/>
  </g>
  <!-- tiny sky dots -->
  <g fill="#E7B23A" opacity="0.6"><circle cx="300" cy="150" r="1.6"/><circle cx="520" cy="135" r="1.4"/><circle cx="470" cy="245" r="1.3"/><circle cx="330" cy="232" r="1.5"/></g>

  <!-- header -->
  <use href="#mark" x="383" y="40" width="34" height="34"/>
  <text x="400" y="118" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="48" font-weight="600" fill="#1c2530">Dogfood</text>
  <text x="400" y="140" text-anchor="middle" font-size="11.5" font-weight="600" letter-spacing="2.6" fill="#C9582E">AI-NATIVE FP&amp;A PLATFORM</text>

  <!-- north star + tagline -->
  <circle cx="400" cy="208" r="78" fill="url(#glow)"/>
  <use href="#star4" x="370" y="172" width="60" height="60"/>
  <text x="400" y="278" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="22" fill="#1c2530">Know your next move</text>
  <path d="M352 290 Q400 298 448 290" fill="none" stroke="#EC6D3F" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>

  <!-- the trail -->
  <path d="M250 968 L250 905 C250 850 540 815 540 760 C540 705 250 670 250 615 C250 560 540 525 540 470 C540 415 400 385 400 330 L400 250"
        fill="none" stroke="#EC6D3F" stroke-opacity="0.85" stroke-width="4" stroke-linecap="round" stroke-dasharray="1.5 11"/>
  <!-- upward chevrons on the trail -->
  <g fill="none" stroke="#EC6D3F" stroke-opacity="0.55" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M392 842 l8 -8 8 8"/><path d="M388 690 l8 -8 8 8"/><path d="M392 545 l8 -8 8 8"/><path d="M388 400 l8 -8 8 8"/>
  </g>

  <!-- Scout near the summit -->
  <circle cx="455" cy="316" r="22" fill="url(#glow)"/>
  <use href="#scout" x="444" y="305" width="22" height="22"/>
  <text x="455" y="350" text-anchor="middle" font-size="10.5" font-weight="600" letter-spacing="0.4" fill="#9A6E1E">SCOUT · your guide</text>

  <!-- ===== Station 5 — Decisions (summit) ===== -->
  <circle cx="400" cy="330" r="37" fill="#FFFFFF" stroke="#C9582E" stroke-width="3" filter="url(#dropsoft)"/>
  <use href="#st-summit" x="384" y="314" width="32" height="32" color="#C9582E"/>
  <circle cx="374" cy="306" r="11" fill="#C9582E"/><text x="374" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">5</text>
  <text x="348" y="324" text-anchor="end" font-size="17" font-weight="600" fill="#1c2530">Decisions</text>
  <text x="348" y="343" text-anchor="end" font-size="12" fill="#6E7B8A">your confident next move</text>

  <!-- ===== Station 4 — Statements that tie out ===== -->
  <circle cx="540" cy="470" r="37" fill="#FFFFFF" stroke="#2A8A66" stroke-width="3" filter="url(#dropsoft)"/>
  <use href="#st-scale" x="524" y="454" width="32" height="32" color="#2A8A66"/>
  <circle cx="514" cy="446" r="11" fill="#2A8A66"/><text x="514" y="450" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">4</text>
  <text x="488" y="464" text-anchor="end" font-size="17" font-weight="600" fill="#1c2530">Statements that tie out</text>
  <text x="488" y="483" text-anchor="end" font-size="12" fill="#6E7B8A">P&amp;L · balance sheet · cash, reconciled</text>

  <!-- ===== Station 3 — Scenarios in minutes ===== -->
  <circle cx="250" cy="615" r="37" fill="#FFFFFF" stroke="#EC6D3F" stroke-width="3" filter="url(#dropsoft)"/>
  <use href="#st-fork" x="234" y="599" width="32" height="32" color="#EC6D3F"/>
  <circle cx="224" cy="591" r="11" fill="#EC6D3F"/><text x="224" y="595" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">3</text>
  <text x="302" y="609" font-size="17" font-weight="600" fill="#1c2530">Scenarios in minutes</text>
  <text x="302" y="628" font-size="12" fill="#6E7B8A">what-ifs, without the spreadsheet</text>

  <!-- ===== Station 2 — A living forecast ===== -->
  <circle cx="540" cy="760" r="37" fill="#FFFFFF" stroke="#B9852A" stroke-width="3" filter="url(#dropsoft)"/>
  <use href="#st-trend" x="524" y="744" width="32" height="32" color="#B9852A"/>
  <circle cx="514" cy="736" r="11" fill="#B9852A"/><text x="514" y="740" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">2</text>
  <text x="488" y="754" text-anchor="end" font-size="17" font-weight="600" fill="#1c2530">A living forecast</text>
  <text x="488" y="773" text-anchor="end" font-size="12" fill="#6E7B8A">updates itself as actuals land</text>

  <!-- ===== Station 1 — Closed actuals (base camp) ===== -->
  <circle cx="250" cy="905" r="37" fill="#FFFFFF" stroke="#2A8A66" stroke-width="3" filter="url(#dropsoft)"/>
  <use href="#st-tent" x="234" y="889" width="32" height="32" color="#2A8A66"/>
  <circle cx="224" cy="881" r="11" fill="#2A8A66"/><text x="224" y="885" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">1</text>
  <text x="302" y="899" font-size="17" font-weight="600" fill="#1c2530">Closed actuals</text>
  <text x="302" y="918" font-size="12" fill="#6E7B8A">the books you’ve already closed</text>
  <text x="250" y="962" text-anchor="middle" font-size="9.5" font-weight="600" letter-spacing="1.5" fill="#9DA7A2">BASE CAMP</text>

  <!-- footer -->
  <line x1="250" y1="1006" x2="550" y2="1006" stroke="#E6DECF" stroke-width="1.5"/>
  <text x="400" y="1034" text-anchor="middle" font-size="13.5" font-weight="600" letter-spacing="0.4" fill="#5A6B7A">dogfood<tspan fill="#C9582E">.cafe</tspan></text>
</svg>
