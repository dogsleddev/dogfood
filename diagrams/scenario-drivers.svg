<svg viewBox="0 0 856 540" width="856" height="540" xmlns="http://www.w3.org/2000/svg" font-family="Geist, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="gRamp" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#EC6D3F" stop-opacity="0.10"/><stop offset="1" stop-color="#EC6D3F" stop-opacity="0.5"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0E1726" flood-opacity="0.16"/></filter>
    <symbol id="ic-rev" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17 L9 11 L13 15 L21 7"/><path d="M21 7 H16 M21 7 V12"/></g></symbol>
    <symbol id="ic-users" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20 a5.5 5.5 0 0 1 11 0"/><circle cx="16.5" cy="9" r="2.3"/><path d="M15.2 14.2 a5 5 0 0 1 5.3 5.8"/></g></symbol>
    <symbol id="ic-wallet" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2.2"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="16.5" cy="14.5" r="1.3"/></g></symbol>
    <symbol id="ic-clock" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15.5 14"/></g></symbol>
  </defs>

  <rect x="8" y="8" width="840" height="524" rx="16" fill="#0E1726" filter="url(#soft)" opacity="0.16"/>
  <rect x="8" y="8" width="840" height="524" rx="16" fill="#FAF7F1" stroke="#E6DECF"/>

  <!-- header -->
  <text x="32" y="46" font-family="Fraunces, Georgia, serif" font-size="20" font-weight="600" fill="#1c2530">Scenario Drivers</text>
  <text x="32" y="66" font-size="11.5" fill="#7A8694">time-boxed levers on top of Base — re-derives this scenario only, nothing outside the group</text>

  <!-- scenario selector -->
  <text x="32" y="98" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#9AA4B0">SCENARIO</text>
  <rect x="96" y="86" width="46" height="18" rx="9" fill="#FFFFFF" stroke="#D7CFC0"/><text x="119" y="98.5" font-size="10" font-weight="500" fill="#6E7B8A" text-anchor="middle">Base</text>
  <rect x="148" y="86" width="74" height="18" rx="9" fill="#FFFFFF" stroke="#D7CFC0"/><text x="185" y="98.5" font-size="10" font-weight="500" fill="#6E7B8A" text-anchor="middle">25% Profit</text>
  <rect x="228" y="86" width="68" height="18" rx="9" fill="#FBEFE9" stroke="#EC6D3F"/><text x="262" y="98.5" font-size="10" font-weight="700" fill="#C9582E" text-anchor="middle">Capacity</text>
  <rect x="302" y="86" width="74" height="18" rx="9" fill="#FFFFFF" stroke="#D7CFC0"/><text x="339" y="98.5" font-size="10" font-weight="500" fill="#6E7B8A" text-anchor="middle">Breakeven</text>
  <text x="800" y="98.5" text-anchor="end" font-size="10" fill="#9AA4B0">Capacity · 4 adjustments</text>

  <!-- column headers + month axis -->
  <text x="32" y="126" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#9AA4B0">DRIVER</text>
  <text x="200" y="126" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#9AA4B0">ADJUSTMENT</text>
  <text x="388" y="126" font-size="9.5" font-weight="600" letter-spacing="0.5" fill="#9AA4B0">ACTIVE WINDOW · Jul–Dec 2026 · monthly</text>
  <text x="422" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Jul</text>
  <text x="491" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Aug</text>
  <text x="559" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Sep</text>
  <text x="628" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Oct</text>
  <text x="696" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Nov</text>
  <text x="765" y="146" font-size="9.5" fill="#7A8694" text-anchor="middle">Dec</text>
  <line x1="32" y1="152" x2="800" y2="152" stroke="#E6DECF"/>

  <!-- vertical month gridlines -->
  <g stroke="#EFE9DE">
    <line x1="388" y1="156" x2="388" y2="408"/><line x1="457" y1="156" x2="457" y2="408"/><line x1="525" y1="156" x2="525" y2="408"/><line x1="594" y1="156" x2="594" y2="408"/><line x1="662" y1="156" x2="662" y2="408"/><line x1="731" y1="156" x2="731" y2="408"/><line x1="800" y1="156" x2="800" y2="408"/>
  </g>
  <!-- row separators -->
  <g stroke="#F1ECE2"><line x1="32" y1="219" x2="800" y2="219"/><line x1="32" y1="282" x2="800" y2="282"/><line x1="32" y1="345" x2="800" y2="345"/></g>

  <!-- ROW 1: Personnel · Delivery team · +12 heads · RAMP Jul-Dec -->
  <use href="#ic-users" x="32" y="178" width="15" height="15" color="#8A6A4A"/>
  <text x="54" y="185" font-size="12.5" font-weight="600" fill="#1c2530">Personnel</text>
  <text x="54" y="199" font-size="9.5" fill="#5A6B7A">Delivery team</text>
  <path d="M170 184 l4 4 4 -4" stroke="#9AA4B0" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="187" x2="300" y2="187" stroke="#E2DACB" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="187" x2="260" y2="187" stroke="#EC6D3F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="260" cy="187" r="5" fill="#FFFFFF" stroke="#EC6D3F" stroke-width="2"/>
  <text x="312" y="191" font-size="12" font-weight="600" fill="#2A8A66">+12 heads</text>
  <text x="392" y="176" font-size="8" font-style="italic" fill="#B9852A">ramp · phases in</text>
  <path d="M388 194 L800 194 L800 180 Z" fill="url(#gRamp)" stroke="#EC6D3F" stroke-opacity="0.5" stroke-width="1"/>

  <!-- ROW 2: Revenue · Services bookings · +25% · STEP Sep-Dec -->
  <use href="#ic-rev" x="32" y="241" width="15" height="15" color="#8A6A4A"/>
  <text x="54" y="248" font-size="12.5" font-weight="600" fill="#1c2530">Revenue</text>
  <text x="54" y="262" font-size="9.5" fill="#5A6B7A">Services bookings</text>
  <path d="M170 247 l4 4 4 -4" stroke="#9AA4B0" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="250" x2="300" y2="250" stroke="#E2DACB" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="275" y2="250" stroke="#EC6D3F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="275" cy="250" r="5" fill="#FFFFFF" stroke="#EC6D3F" stroke-width="2"/>
  <text x="312" y="254" font-size="12" font-weight="600" fill="#2A8A66">+25%</text>
  <text x="529" y="239" font-size="8" fill="#9AA4B0">step</text>
  <rect x="525" y="243" width="275" height="14" rx="4" fill="#EC6D3F" fill-opacity="0.30" stroke="#EC6D3F" stroke-opacity="0.5"/>

  <!-- ROW 3: Expense · S&M · +15% · STEP Aug-Dec -->
  <use href="#ic-wallet" x="32" y="304" width="15" height="15" color="#8A6A4A"/>
  <text x="54" y="311" font-size="12.5" font-weight="600" fill="#1c2530">Expense</text>
  <text x="54" y="325" font-size="9.5" fill="#5A6B7A">Sales &amp; Marketing</text>
  <path d="M170 310 l4 4 4 -4" stroke="#9AA4B0" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="313" x2="300" y2="313" stroke="#E2DACB" stroke-width="4" stroke-linecap="round"/>
  <line x1="250" y1="313" x2="265" y2="313" stroke="#EC6D3F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="265" cy="313" r="5" fill="#FFFFFF" stroke="#EC6D3F" stroke-width="2"/>
  <text x="312" y="317" font-size="12" font-weight="600" fill="#2A8A66">+15%</text>
  <text x="461" y="302" font-size="8" fill="#9AA4B0">step</text>
  <rect x="457" y="306" width="343" height="14" rx="4" fill="#EC6D3F" fill-opacity="0.30" stroke="#EC6D3F" stroke-opacity="0.5"/>

  <!-- ROW 4: AR · DSO · 50 days · STEP Jul-Dec -->
  <use href="#ic-clock" x="32" y="367" width="15" height="15" color="#8A6A4A"/>
  <text x="54" y="374" font-size="12.5" font-weight="600" fill="#1c2530">AR</text>
  <text x="54" y="388" font-size="9.5" fill="#5A6B7A">DSO (days)</text>
  <path d="M170 373 l4 4 4 -4" stroke="#9AA4B0" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="376" x2="300" y2="376" stroke="#E2DACB" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="376" x2="233" y2="376" stroke="#EC6D3F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="233" cy="376" r="5" fill="#FFFFFF" stroke="#EC6D3F" stroke-width="2"/>
  <text x="312" y="380" font-size="12" font-weight="600" fill="#1c2530">50 days</text>
  <text x="392" y="365" font-size="8" fill="#9AA4B0">step</text>
  <rect x="388" y="369" width="412" height="14" rx="4" fill="#EC6D3F" fill-opacity="0.30" stroke="#EC6D3F" stroke-opacity="0.5"/>

  <!-- add adjustment -->
  <rect x="32" y="420" width="168" height="24" rx="12" fill="none" stroke="#EC6D3F" stroke-opacity="0.5" stroke-dasharray="4 3"/>
  <text x="116" y="436" font-size="11" font-weight="600" fill="#C9582E" text-anchor="middle">+ Add adjustment</text>

  <!-- footer -->
  <line x1="32" y1="460" x2="824" y2="460" stroke="#EFE9DE"/>
  <text x="32" y="479" font-size="10.5" fill="#5A6B7A">Each adjustment overrides its driver <tspan font-weight="600" fill="#1c2530">only inside its window</tspan>; outside it, the driver follows Base. Adjustments stack.</text>
  <text x="32" y="495" font-size="10.5" fill="#5A6B7A">Re-derives <tspan font-weight="600" fill="#1c2530">Scenario P&amp;L</tspan> and <tspan font-weight="600" fill="#1c2530">Scenario Dashboard</tspan> — the rest of the app stays on Base + actuals.</text>

  <!-- legend -->
  <rect x="540" y="471" width="16" height="9" rx="2" fill="#EC6D3F" fill-opacity="0.30" stroke="#EC6D3F" stroke-opacity="0.5"/>
  <text x="562" y="479" font-size="9.5" fill="#5A6B7A">Step: full from start</text>
  <path d="M672 480 L724 480 L724 471 Z" fill="url(#gRamp)" stroke="#EC6D3F" stroke-opacity="0.5" stroke-width="1"/>
  <text x="730" y="479" font-size="9.5" fill="#5A6B7A">Ramp: phases in</text>
</svg>
